{% extends "base.html" %}
{% set page_title = "Add Trade" if mode == "new" else "Edit Trade" %}

{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <div class="section-title">{{ "Add trade" if mode == "new" else "Edit trade" }}</div>
      <div class="text-secondary small">Profit/Loss is calculated automatically on save.</div>
    </div>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('trades.list_trades') }}">Back</a>
  </div>

  <div class="card card-glass p-3 p-md-4">
    <form method="post" action="{% if mode == 'new' %}{{ url_for('trades.new_trade_post') }}{% else %}{{ url_for('trades.edit_trade_post', trade_id=trade.id) }}{% endif %}">
      <div class="row g-3">
        <div class="col-12 col-md-3">
          <label class="form-label">Trade type</label>
          <select class="form-select form-control-dark" name="trade_type" required>
            {% set ttype = (trade.trade_type if trade else 'BUY') %}
            <option value="BUY" {% if ttype == 'BUY' %}selected{% endif %}>BUY</option>
            <option value="SELL" {% if ttype == 'SELL' %}selected{% endif %}>SELL</option>
          </select>
        </div>
        <div class="col-12 col-md-5">
          <label class="form-label">Asset</label>
          <input class="form-control form-control-dark" name="asset" value="{{ trade.asset if trade else '' }}" placeholder="BTCUSDT / AAPL / EURUSD" required />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Strategy</label>
          <select class="form-select form-control-dark" name="strategy_id">
            <option value="">—</option>
            {% for s in strategies %}
              <option value="{{ s.id }}" {% if trade and trade.strategy_id == s.id %}selected{% endif %}>{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12 col-md-4">
          <label class="form-label">Entry price</label>
          <input class="form-control form-control-dark" name="entry_price" type="number" step="0.0001" value="{{ trade.entry_price if trade else '' }}" required />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Exit price</label>
          <input class="form-control form-control-dark" name="exit_price" type="number" step="0.0001" value="{{ trade.exit_price if trade else '' }}" required />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Quantity</label>
          <input class="form-control form-control-dark" name="quantity" type="number" step="0.0001" value="{{ trade.quantity if trade else '' }}" required />
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label">Opened at</label>
          <input class="form-control form-control-dark" name="opened_at" type="datetime-local" value="{{ (trade.opened_at|replace(' ', 'T')) if trade and trade.opened_at else '' }}" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Closed at</label>
          <input class="form-control form-control-dark" name="closed_at" type="datetime-local" value="{{ (trade.closed_at|replace(' ', 'T')) if trade and trade.closed_at else '' }}" required />
        </div>

        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea class="form-control form-control-dark" name="notes" rows="4" placeholder="What went well? What will you improve?">{{ trade.notes if trade else '' }}</textarea>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-primary btn-trade" type="submit">{{ "Add trade" if mode == "new" else "Save changes" }}</button>
        <a class="btn btn-outline-light" href="{{ url_for('trades.list_trades') }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
