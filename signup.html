{% extends "base.html" %}
{% set page_title = "Signup" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card card-glass p-3 p-md-4">
        <h3 class="mb-1">Create your journal</h3>
        <p class="text-secondary mb-4">Track trades, visualize performance, and get AI insights.</p>

        <form method="post" action="{{ url_for('auth.signup_post') }}" class="stack">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Username</label>
              <input class="form-control form-control-dark" name="username" placeholder="trader123" required />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label">Email</label>
              <input class="form-control form-control-dark" name="email" type="email" placeholder="you@example.com" required />
            </div>
            <div class="col-12">
              <label class="form-label">Password</label>
              <input class="form-control form-control-dark" name="password" type="password" placeholder="Minimum 6 characters" required />
            </div>
          </div>

          <button class="btn btn-primary w-100 btn-trade mt-3" type="submit">Create account</button>
        </form>

        <div class="mt-3 text-center text-secondary">
          Already have an account?
          <a href="{{ url_for('auth.login') }}" class="link-light">Login</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
